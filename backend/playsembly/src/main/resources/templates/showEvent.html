<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${event.name}">Event</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .game-img-card {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        .game-img-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            text-align: center;
            padding: 5px;
            font-size: 0.9rem;
        }

        .card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card-body {
            display: flex;
            flex-direction: column;
        }

        .card-body .btn {
            margin-top: auto;
        }

        .clamp-2 {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            max-height: 3em;

            overflow: hidden;
            text-overflow: ellipsis;

            word-break: break-word;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- HEADER -->
<div class="mb-4 d-flex justify-content-between align-items-center">
    <!-- Vasemmalla otsikko -->
    <h2 th:text="${event.name}"></h2>

    <!-- Oikealla Home-nappi -->
    <a th:href="@{/events}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Home
    </a>
</div>

<!-- Lisätiedot alle -->
<p class="text-muted">
    📍 <span th:text="${event.location}"></span>,
    <span th:text="${event.city}"></span> |
    🕒 <span th:text="${#temporals.format(event.startTime, 'dd.MM.yyyy HH:mm')} + ' - ' + ${#temporals.format(event.endTime, 'dd.MM.yyyy HH:mm')}"></span>
</p>

    <!-- Filter by Name -->
    <div class="mb-3">
        <label for="gameFilter" class="form-label">Filter Sessions by Name:</label>
        <input type="text" id="gameFilter" class="form-control" placeholder="Type text here"
            onkeyup="filterGames()">
    </div>

    <!-- GAME SESSIONS -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header d-flex justify-content-between">
            <h5>Game Sessions</h5>

            <a class="btn btn-success btn-sm"
                th:href="@{/event/{id}/game/new(id=${event.id})}">
                + Add Game
            </a>
        </div>

        <div class="row g-3">
            <div th:each="game : ${games}" class="col-md-4">
                <div class="card">
                    <div class="position-relative">
                        <!-- Pääkuva -->
                        <img th:src="${game.boardgame.imageUrl}" class="card-img-top" alt="Game Image" style="height:250px; object-fit:cover; object-position: 50% 20%;">

                        <!-- Overlay vasemmassa alakulmassa: Creator -->
                        <div class="position-absolute bottom-0 start-0 bg-dark text-white px-2 py-1 opacity-75">
                            <span th:text="${game.creator != null ? game.creator.username : 'Unknown'}"></span>
                        </div>

                        <!-- Overlay keskellä alakulmaa: Start time -->
                        <div class="position-absolute bottom-0 start-50 translate-middle-x bg-dark text-white px-2 py-1 opacity-75">
                            <span th:text="${game.startTime != null ? #temporals.format(game.startTime, 'E HH:mm') : '--:--'}"></span>
                        </div>

                        <!-- Overlay oikeassa alakulmassa: Player count -->
                        <div class="position-absolute bottom-0 end-0 bg-dark text-white px-2 py-1 opacity-75">
                            <span th:text="${game.participantCount} + '/' + ${game.maxPlayers}"></span>
                        </div>
                    </div>

                    <div class="card-body">
                        <h5 class="clamp-2" th:text="${game.boardgame.name}">Game Name</h5>

                        <div class="d-flex gap-2">
                            <a th:href="@{/game/{id}(id=${game.id})}" class="btn btn-primary btn-sm">View</a>

                            <a th:href="@{/game/edit/{id}(id=${game.id})}" 
                            class="btn btn-outline-secondary btn-sm"
                            th:if="${gameEditMap[game.id]}">
                            Edit
                            </a>

                            <form th:action="@{/game/delete/{id}(id=${game.id})}" 
                                method="post" 
                                th:if="${@gameSecurity.isCreatorOrAdmin(game.id, #authentication.principal)}"
                                class="d-inline"
                                onsubmit="return confirm('Are you sure you want to delete this game session?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i> Delete
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 📋 WANT LIST -->
    <div class="mb-4">

        <h4 class="mb-3">Want List</h4>

        <div class="row g-3">

            <div class="col-md-2 col-6"
                 th:each="item : ${wantList}">

                <div class="game-img-card shadow-sm">

                    <!-- kuva -->
                    <img th:src="${item.boardgame.imageUrl}"
                         alt="game">

                    <!-- overlay -->
                    <div class="overlay">
                        <span th:text="${item.user.username}"></span>
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- 📦 BRING LIST -->
    <div>

        <h4 class="mb-3">Bring List</h4>

        <div class="row g-3">

            <div class="col-md-2 col-6"
                 th:each="item : ${bringList}">

                <div class="game-img-card shadow-sm">

                    <img th:src="${item.boardgame.imageUrl}"
                         alt="game">

                    <div class="overlay">
                        <span th:text="${item.user.username}"></span>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Tällä filtteröidään pelejä aktiivisesti nimen perusteella kirjoitettaessa.
Koska pelit on palautettu näkymään aikajärjestyksessä, toimivat molemmat organisaattorit yhdessä. -->
<script>
function filterGames() {
    const input = document.getElementById('gameFilter');
    const filter = input.value.toLowerCase();
    const gameCards = document.querySelectorAll('.row.g-3 > .col-md-4');

    gameCards.forEach(card => {
        const gameName = card.querySelector('h5.clamp-2').textContent.toLowerCase();
        if (gameName.includes(filter)) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
}
</script>

</body>
</html>
