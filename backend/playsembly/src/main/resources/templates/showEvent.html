<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${event.name}">Event</title>

    <!-- CSRF tokenit -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        /* --- Game Sessions (säilytetään ennallaan) --- */
        .card-body .btn {
            margin-top: auto;
        }

        .clamp-2 {
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            max-height: 3em;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-word;
        }

        /* --- Want / Bring List --- */
        .list-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: flex-start; /* vasemmalle */
        }

        .list-col {
            width: 120px;
            position: relative;
            min-height: 160px; /* tilaa ylä- ja alapuolella oleville elementeille */
        }

        .circle-wrapper {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden; /* vain kuvalle */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin: auto;
        }

        .circle-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .username-overlay {
            position: absolute;
            top: 0; /* kuvan yläpuolelle */
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            background: #0d6efd;
            color: white;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 10px;
            text-align: center;
            white-space: normal;
            width: max-content;
            z-index: 10;
        }
        .bring-button {
            position: absolute;
            right: -5px;
            top: 50%;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: #198754;
            color: white;
            border: none;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 10;
        }
        .remove-button {
            position: absolute;
            left: -5px; /* vastakkainen puoli */
            top: 50%;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background-color: #dc3545; /* punainen */
            color: white;
            border: none;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 10;
        }
        #loadingSpinner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
        }
    </style>
</head>

<body>
<div class="container mt-4">
    <!-- HEADER -->
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <h2 th:text="${event.name}"></h2>
        <a th:href="@{/events}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Home</a>
    </div>

    <p class="text-muted">
        📍 <span th:text="${event.location}"></span>, <span th:text="${event.city}"></span> |
        🕒 <span th:text="${#temporals.format(event.startTime, 'dd.MM.yyyy HH:mm')} + ' - ' + ${#temporals.format(event.endTime, 'dd.MM.yyyy HH:mm')}"></span>
    </p>

    <!-- Filter by Name -->
    <div class="mb-3">
        <label for="gameFilter" class="form-label">Filter Sessions by Name:</label>
        <input type="text" id="gameFilter" class="form-control" placeholder="Type text here" onkeyup="filterGames()">
    </div>

    <!-- GAME SESSIONS -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header d-flex justify-content-between">
            <h5>Game Sessions</h5>
            <a class="btn btn-success btn-sm" th:href="@{/event/{id}/game/new(id=${event.id})}">+ Add Game</a>
        </div>
        <div class="row g-3">
            <div th:each="game : ${games}" class="col-md-4">
                <div class="card">
                    <div class="position-relative">
                        <img th:src="${game.boardgame.imageUrl}" class="card-img-top" alt="Game Image" style="height:250px; object-fit:cover; object-position: 50% 20%;">
                        <div class="position-absolute bottom-0 start-0 bg-dark text-white px-2 py-1 opacity-75">
                            <span th:text="${game.creator != null ? game.creator.username : 'Unknown'}"></span>
                        </div>
                        <div class="position-absolute bottom-0 start-50 translate-middle-x bg-dark text-white px-2 py-1 opacity-75">
                            <span th:text="${game.startTime != null ? #temporals.format(game.startTime, 'E HH:mm') : '--:--'}"></span>
                        </div>
                        <div class="position-absolute bottom-0 end-0 bg-dark text-white px-2 py-1 opacity-75">
                            <span th:text="${game.participantCount} + '/' + ${game.maxPlayers}"></span>
                        </div>
                    </div>
                    <div class="card-body">
                        <h5 class="clamp-2" th:text="${game.boardgame.name}">Game Name</h5>
                        <div class="d-flex gap-2">
                            <a th:href="@{/game/{id}(id=${game.id})}" class="btn btn-primary btn-sm">View</a>
                            <a th:href="@{/game/edit/{id}(id=${game.id})}" class="btn btn-outline-secondary btn-sm" th:if="${gameEditMap[game.id]}">Edit</a>
                            <form th:action="@{/game/delete/{id}(id=${game.id})}" method="post" th:if="${@gameSecurity.isCreatorOrAdmin(game.id, #authentication.principal)}" class="d-inline" onsubmit="return confirm('Are you sure?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-danger btn-sm"><i class="bi bi-trash"></i> Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- WANT LIST -->
    <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Want List</h4>
            <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#addGameModal">+ Ask for a Game</button>
        </div>

        <div class="list-row" id="wantListRow">
            <div class="list-col" th:each="item : ${wantList}" th:id="'want-'+${item.boardgame.bggId}">
                <!-- Pyytäjän käyttäjänimi kuvan yläpuolella -->
                <div class="username-overlay"
                    th:text="'Asker: ' + ${item.user.username}">
                </div>

                <!-- Kuva -->
                <div class="circle-wrapper">
                    <img th:src="${item.boardgame.imageUrl}" alt="game">
                </div>

                <!-- Remove nappi kuvan vasemmalla alareunalla -->
                <form th:if="${item.user != null and @gameSecurity.isWantItemOwnerOrAdmin(item, #authentication.principal)}" th:action="@{/event/{eventId}/want/remove/{bggId}(eventId=${event.id}, bggId=${item.boardgame.bggId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="remove-button">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </form>

                <!-- Bring-nappi kuvan oikealla alareunalla -->
                <form th:action="@{/event/{eventId}/bring/add/{bggId}(eventId=${event.id}, bggId=${item.boardgame.bggId})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="bring-button"><i class="bi bi-arrow-down"></i></button>
                </form>
            </div>
        </div>

    <!-- BRING LIST -->
        <div class="mb-4">
            <h4 class="mb-3">Bring List</h4>
            <div class="list-row" id="bringListRow">
                <div class="list-col" th:each="item : ${bringList}" th:id="'bring-'+${item.boardgame.bggId}">
                    <div class="circle-wrapper shadow-sm">
                        <img th:src="${item.boardgame.imageUrl}" alt="game">
                        <div class="username-overlay" th:text="${item.user.username}"></div>
                        <form th:action="@{/api/bgg/bring/{bggId}(bggId=${item.boardgame.bggId})}" method="post">
                            <input type="hidden" name="eventId" th:value="${event.id}" />
                            <input type="hidden" name="username" th:value="${#authentication.name}" />
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="bring-button">Bring this</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD GAME MODAL -->
    <div class="modal fade" id="addGameModal" tabindex="-1" th:attr="data-event-id=${event.id},data-username=${#authentication.name}">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Game to Want List</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label>Search Board Game</label>
                        <input type="text" id="search" class="form-control" placeholder="Search from BGG...">
                        <button type="button" id="searchBtn" class="btn btn-primary mt-2">Search</button>
                    </div>
                    <div id="results" class="row g-3"></div>
                </div>
            </div>
        </div>
    </div>

<!-- Loading spinner -->
<div id="loadingSpinner">
    <div class="spinner-border text-light" style="width: 4rem; height: 4rem;"></div>
</div>

<script>
    function filterGames() {
        const input = document.getElementById('gameFilter').value.toLowerCase();
        document.querySelectorAll('.row.g-3 > .col-md-4').forEach(card => {
            const name = card.querySelector('h5.clamp-2').textContent.toLowerCase();
            card.style.display = name.includes(input) ? '' : 'none';
        });
    }

    // --- BGG SEARCH (add to want list) ---
    const modal = document.getElementById('addGameModal');
    modal.addEventListener('shown.bs.modal', () => {
        const searchBtn = modal.querySelector('#searchBtn');
        const searchInput = modal.querySelector('#search');
        const results = modal.querySelector('#results');
        const spinner = document.getElementById('loadingSpinner');

        searchBtn.addEventListener('click', () => {
            const query = searchInput.value.trim();
            if(query.length < 2) return;

            const EVENT_ID = modal.dataset.eventId;
            const USERNAME = modal.dataset.username;

            spinner.style.display = 'flex';
            results.innerHTML = '';

            fetch(`/api/bgg/search?query=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    data.forEach(game => {
                        const item = document.createElement('button');
                        item.type = 'button';
                        item.className = 'list-group-item list-group-item-action d-flex align-items-center';

                        const img = document.createElement('img');
                        img.src = game.imageUrl?.replace("http://","https://") || "placeholder.png";
                        img.style.width="50px"; img.style.height="50px"; img.className="me-2";

                        const span = document.createElement("span");
                        span.textContent = game.name + " (" + game.year + ")";

                        item.appendChild(img);
                        item.appendChild(span);

                        item.onclick = () => {
                            const csrfToken = document.querySelector('meta[name="_csrf"]').content;
                            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

                            fetch(`/api/bgg/want/${game.id}?eventId=${EVENT_ID}&username=${USERNAME}`, {
                                method: "POST",
                                headers: { [csrfHeader]: csrfToken }
                            }).then(() => {
                                const wantRow = document.getElementById('wantListRow');
                                const col = document.createElement('div');
                                col.className = 'list-col';
                                col.innerHTML = `
                                    <div class="username-overlay">Asker: ${USERNAME}</div>
                                    <div class="circle-wrapper">
                                        <img src="${game.imageUrl?.replace("http://","https://") || 'placeholder.png'}" alt="game">
                                    </div>
                                    <form method="post" action="/event/${EVENT_ID}/want/remove/${game.id}">
                                        <input type="hidden" name="_csrf" value="${csrfToken}">
                                        <button type="submit" class="remove-button"><i class="bi bi-x-lg"></i></button>
                                    </form>
                                    <form method="post" action="/event/${EVENT_ID}/bring/add/${game.id}">
                                        <input type="hidden" name="_csrf" value="${csrfToken}">
                                        <button type="submit" class="bring-button"><i class="bi bi-arrow-down"></i></button>
                                    </form>
                                `;
                                wantRow.appendChild(col);

                                const bsModal = bootstrap.Modal.getInstance(modal);
                                bsModal.hide();
                            });
                        };

                        results.appendChild(item);
                    });
                })
                .finally(() => { spinner.style.display = 'none'; });
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
