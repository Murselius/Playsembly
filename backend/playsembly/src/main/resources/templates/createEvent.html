<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${event.id != null} ? 'Edit Event' : 'Create Event'">Event</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2 th:text="${event.id != null} ? 'Edit Event' : 'Create Event'">Event</h2>

    <form th:action="@{/event/save}" th:object="${event}" method="post">

        <!-- CSRF -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Event ID (tarvitaan muokkausta varten) -->
        <input type="hidden" th:field="*{id}"/>

        <!-- Tapahtuman nimi -->
        <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text"
                   class="form-control"
                   th:field="*{name}"
                   required>
        </div>

        <!-- Kaupunki -->
        <div class="mb-3">
            <label class="form-label">City</label>
            <input type="text"
                   class="form-control"
                   th:field="*{city}">
        </div>

        <!-- Osoite -->
        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text"
                   class="form-control"
                   th:field="*{location}">
        </div>

        <div class="mb-3">
            <label class="form-label">Start Time</label>
            <input type="datetime-local"
                class="form-control"
                th:field="*{startTime}"
                th:value="${startTimeString}"
                th:attr="min=${minDateTime}">
        </div>

        <div class="mb-3">
            <label class="form-label">End Time</label>
            <input type="datetime-local"
                class="form-control"
                th:field="*{endTime}"
                th:value="${endTimeString}"
                th:attr="min=${minDateTime}">
        </div>

        <!-- Submit -->
        <button class="btn btn-success" type="submit"
                th:text="${event.id != null} ? 'Save Changes' : 'Create'">
            Create
        </button>

        <a class="btn btn-secondary" th:href="@{/events}">Cancel</a>

    </form>

</div>

</body>
</html>
