<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Home</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- pieni tyylittely -->
    <style>
        body {
            background-color: #f8f9fa;
        }

        .event-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <span class="navbar-brand fw-bold">
            🎲 Playsembly
        </span>

        <div class="position-absolute top-50 start-50 translate-middle">
            <img src="/media/bgg.webp"
                 alt="Powered by BGG"
                 style="height:40px;">
        </div>

        <div class="ms-auto d-flex align-items-center gap-2">

            <!-- käyttäjänimi -->
            <span class="text-light"
                  th:text="${#authentication.name}">
                User
            </span>

            <!-- logout -->
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>

        </div>

    </div>
</nav>

<!-- SISÄLTÖ -->
<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">
            <i class="bi bi-calendar-event"></i> Events
        </h2>

        <a class="btn btn-primary shadow-sm"
            th:href="@{/event/new}">
            <i class="bi bi-plus-circle"></i> Create Event
        </a>

    </div>

    <!-- EVENT GRID -->
    <div class="row g-4">

        <div class="col-lg-4 col-md-6"
             th:each="event : ${events}">

            <div class="card event-card h-100 border-0 shadow-sm">

                <div class="card-body d-flex flex-column">

                    <!-- Nimi -->
                    <h5 class="card-title fw-bold"
                        th:text="${event.name}">
                        Event Name
                    </h5>

                    <!-- Info -->
                    <p class="text-muted mb-3">

                        <i class="bi bi-geo-alt"></i>
                        <span th:text="${event.city}"></span>
                        <br>

                        <i class="bi bi-building"></i>
                        <span th:text="${event.location}"></span>
                        <br>

                        <i class="bi bi-clock"></i>
                        <span th:text="${#temporals.format(event.startTime, 'dd.MM.yyyy HH:mm')} + ' - ' + ${#temporals.format(event.endTime, 'dd.MM.yyyy HH:mm')}"></span>

                    </p>

                    <!-- Spacer -->
                    <div class="mt-auto d-flex gap-2 flex-wrap">

                        <!-- OPEN -->
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/event/{id}(id=${event.id})}">
                            <i class="bi bi-box-arrow-in-right"></i>
                            Open
                        </a>

                        <!-- EDIT -->
                        <a class="btn btn-outline-warning btn-sm"
                           th:href="@{/event/edit/{id}(id=${event.id})}"
                           sec:authorize="hasAnyAuthority('MODERATOR', 'ADMIN')">
                            <i class="bi bi-pencil"></i>
                            Edit
                        </a>

                        <!-- DELETE -->
                        <form th:action="@{/event/delete/{id}(id=${event.id})}"
                              method="post"
                              sec:authorize="hasAuthority('ADMIN')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /> <!--CSRF TOKEN-->


                            <button class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('Delete this event?')">
                                <i class="bi bi-trash"></i>
                                Delete
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
