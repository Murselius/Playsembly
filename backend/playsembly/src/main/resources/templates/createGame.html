<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${game.id != null} ? 'Edit Game' : 'Add Game to Event'">Add Game to Event</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>
<div class="container mt-4">

    <!-- Otsikko riippuu tilasta -->
    <h3 th:text="${game.id != null} ? 'Edit Game' : 'Add Game to Event'">Add Game to Event</h3>

    <!-- Lomakkeen tila on joko luonti tai edit riippuen löytyykö peliä id:llä-->
    <form th:action="${game.id != null} ? @{/game/update/{id}(id=${game.id})} : @{/event/{id}/game(id=${event.id})}"
          th:object="${game}" method="post" onsubmit="return validateGameForm()">

        <!-- CSRF token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- BGG Haku (vain luomisessa, muutoin hidden) -->
        <div class="mb-3" th:if="${game.id == null}">
            <label>Search Board Game</label>
            <input type="text" id="search" class="form-control" placeholder="Search from BGG...">
            <button type="button" id="searchBtn" class="btn btn-primary mt-2">Search</button>
        </div>

        <!-- Hakutulokset -->
        <div id="results" class="list-group mb-3"></div>

        <!-- Valittu peli / editissä näkyy automaattisesti entinen -->
        <div id="selectedGame" class="card mt-3" 
             th:classappend="${game.id == null} ? ' d-none' : ''" 
             style="max-width: 400px;">
            <div class="row g-0 align-items-center">
                <div class="col-4">
                    <img id="selectedImg" class="img-fluid rounded-start"
                         th:src="${game.boardgame != null} ? ${game.boardgame.imageUrl} : ''">
                </div>
                <div class="col-8">
                    <div class="card-body p-2">
                        <h6 id="selectedName" class="card-title mb-1"
                            th:text="${game.boardgame != null} ? ${game.boardgame.name} : ''"></h6>
                        <small id="selectedYear" class="text-muted"
                               th:text="${game.boardgame != null} ? ${game.boardgame.yearPublished} : ''"></small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Valittu BGG-id -->
        <input type="hidden" th:field="*{boardgame.bggId}" id="bggId">

        <!-- Start Time -->
        <div class="mb-3">
            <label>Start Time</label>
            <input type="datetime-local"
                   class="form-control"
                   th:field="*{startTime}"
                   th:value="${startTimeString}"
                   th:attr="min=${eventStart}, max=${eventEnd}"
                   required>
        </div>

        <!-- Min Players -->
        <div class="mb-3">
            <label>Min Players</label>
            <input type="number" 
                   class="form-control" 
                   th:field="*{minPlayers}"
                   th:attr="min=1">
                   <div class="text-danger" th:errors="*{minPlayers}"></div>
        </div>

        <!-- Max Players -->
        <div class="mb-3">
            <label>Max Players</label>
            <input type="number" 
                   class="form-control" 
                   th:field="*{maxPlayers}"
                   th:attr="min=1">
                   <div class="text-danger" th:errors="*{maxPlayers}"></div>
        </div>

        <!-- Kenttä joka näkyy jos on olemassa globaaleja virheitä (esim jos minPlayers>maxPlayers)-->
        <div th:if="${#fields.hasGlobalErrors()}">
            <p class="text-danger" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        </div>

        <!-- Estimated Duration -->
        <div class="mb-3">
            <label>Estimated Duration (minutes)</label>
            <input type="number" 
                   class="form-control" 
                   th:field="*{estimatedDuration}"
                   th:attr="min=1">
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label>Description (optional)</label>
            <textarea class="form-control" th:field="*{description}" rows="3"
                      placeholder="Describe the session..."></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success" 
                    th:text="${game.id != null} ? 'Save Changes' : 'Create Game'">
                Create Game
            </button>

            <a th:href="@{/event/{id}(id=${event.id})}" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>

<!-- Loading spinner -->
<div id="loadingSpinner" style="
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    z-index:9999;
    justify-content: center;
    align-items: center;
">
    <div class="spinner-border text-light" style="width: 4rem; height: 4rem;">
    </div>
</div>

<script>
    // BGG Search script
    const searchInput = document.getElementById("search");
    if(searchInput) {
        document.getElementById("search").addEventListener("keydown", function(e) {
            if(e.key === "Enter") e.preventDefault();
        });

        document.getElementById("searchBtn").addEventListener("click", function () {
            const btn = document.getElementById("searchBtn");
            btn.disabled=true;
            showSpinner();
            const query = searchInput.value;
            if (query.length < 2) { btn.disabled=false; return; }

            fetch("/api/bgg/search?query=" + query)
                .then(res => res.json())
                .then(data => {
                    const results = document.getElementById("results");
                    results.innerHTML = "";

                    data.forEach(game => {
                        const item = document.createElement("button");
                        item.type = "button";
                        item.className = "list-group-item list-group-item-action d-flex align-items-center";

                        const img = document.createElement("img");
                        img.src = game.imageUrl?.replace("http://", "https://") || "placeholder.png";
                        img.style.width="50px"; img.style.height="50px";
                        img.className="me-2";

                        const span = document.createElement("span");
                        span.textContent = game.name + " (" + game.year + ")";

                        item.appendChild(img);
                        item.appendChild(span);

                        item.onclick = () => {
                            document.getElementById("bggId").value = game.id;
                            const card = document.getElementById("selectedGame");
                            card.classList.remove("d-none");
                            document.getElementById("selectedImg").src = game.imageUrl?.replace("http://", "https://") || "placeholder.png";
                            document.getElementById("selectedName").textContent = game.name;
                            document.getElementById("selectedYear").textContent = game.year;
                            results.innerHTML = "<div class='alert alert-success'>Selected: " + game.name + "</div>";
                        };

                        results.appendChild(item);
                    });
                })
                .finally(()=> {
                    btn.disabled=false;
                    hideSpinner();
                });
        });
    }

function showSpinner() {
    document.getElementById("loadingSpinner").style.display = "flex";
}

function hideSpinner() {
    document.getElementById("loadingSpinner").style.display = "none";
}

//Pelaajamääräarvojen tarkistus ennen lomakkeen lähetystä
function validateGameForm() {
    const minPlayers = document.querySelector('input[name="minPlayers"]').value;
    const maxPlayers = document.querySelector('input[name="maxPlayers"]').value;

    if(Number(minPlayers) > Number(maxPlayers)){
        alert("Min players cannot exceed max players");
        return false; // estää lomakkeen lähetyksen
    }
    return true; // lomake voidaan lähettää
}
</script>

</body>
</html>
